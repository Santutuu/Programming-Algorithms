<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman - BFS vs DFS</title>
    <style>
        /* --- Barra de Navegación --- */
        .navbar {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            background: linear-gradient(135deg, #4A2C2A, #7A2E2E);
            width: 100%;
            padding: 2emem;
            box-sizing: border-box;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            min-height: 70px;
        }

        .navbar h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .navbar h1 a {
            color: white;
            text-decoration: none;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .navbar .nav-title {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .navbar a:hover {
            background-color: rgba(255,255,255,0.15);
        }

        .navbar .nav-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }

        .navbar a:hover {
            background-color: #555;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding-top: 80px; /* Espacio para la navbar fija */
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            background: linear-gradient(135deg, #C0603D, #7A2E2E);
            color: #2c1e16;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            align-items: start;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto; /* Centrar el contenedor */
        }

        .laberinto-container {
            background: #F7F3EE;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #2E1A12;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.35);
        }

        h1 {
            color: #2c1e16;
            font-size: 3rem;
            margin-bottom: 0.4rem;
        }

        h2 {
            color: #2c1e16;
            border-bottom: 2px solid #4A2C2A;
        }

        .controles-container {
            background: #F7F3EE;
            border: 2px solid #4A2C2A;
        }

        .status {
            background: #f2e9e3;
            border-color: #a0775c;
            color: #2c1e16;
        }

        .controles-container {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00ff00;
            font-size: 2em;
        }

        h2 {
            color: #00ff00;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .laberinto {
            display: grid;
            grid-template-columns: repeat(19, 30px);
            grid-template-rows: repeat(17, 30px);
            gap: 1px;
            background: #111;
            border: 2px solid #4A2C2A;
            padding: 15px;
            border-radius: 5px;
            margin: 15px auto;
            justify-content: center;
        }

        .laberinto .celda {
            border: 1px solid #2f4f0f;
        }

        .celda {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            font-weight: bold;
            font-size: 14px;
        }

        .pared { 
            background: #002200; 
            border: 1px solid #004400;
        }
        .camino { 
            background: #000; 
            border: 1px solid #222;
        }
        .pacman { 
            background: #ffff00; 
            color: #000;
            border: 2px solid #ffaa00;
            font-size: 16px;
        }
        .fantasma { 
            background: #ff0000; 
            color: white;
            border: 2px solid #ff4444;
            font-size: 16px;
        }
        .camino-bfs { 
            background: #f5b041; 
            border: 1px solid #ffa500;
            color: #000;
        }
        .explorado-dfs { 
            background: #b36bcf; 
            border: 1px solid #b24ecf;
            color: #fff;
        }

        .botones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .botones button {
            padding: 12px 14px;
            border: 2px solid #4A2C2A;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: #2c1e16;
            background: #F7F3EE;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .botones button:hover {
            transform: translateY(-1px);
            border-color: #7A2E2E;
        }

        .btn-bfs {
            color: #2c1e16;
            border-color: #DE9B18;
            background: #ffefc7;
        }

        .btn-bfs:hover {
            background: #f2c57f;
            color: #2c1e16;
        }

        .btn-dfs {
            color: #2c1e16;
            border-color: #7A3E9A;
            background: #ecd8f9;
        }

        .btn-dfs:hover {
            background: #d8b4f5;
            color: #2c1e16;
        }

        .btn-reset {
            color: #2c1e16;
            border-color: #4A2C2A;
            background: #fff7e8;
            grid-column: 1 / -1;
        }

        .btn-reset:hover {
            background: #f2e5d8;
            color: #2c1e16;
        }

        .botones-canchas {
            margin: 15px 0;
        }

        .botones-cancha {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-cancha {
            padding: 8px;
            border: 2px solid #00ffff;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            color: #00ffff;
            background: #000;
        }

        .btn-cancha:hover {
            background: #00ffff;
            color: #000;
        }

        .metricas {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            color: #f5f5f5;
        }

        .metricas h3 {
            font-size: 1.2rem;
            margin: 0 0 10px;
            color: #adea73;
        }

        .metrica {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            font-size: 18px;
        }

        .metrica strong {
            font-size: 1.1rem;
            color: #ffde59;
        }

        .status {
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border: 1px solid #00ff00;
            border-radius: 5px;
            font-size: 12px;
        }

        .leyenda {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
            font-size: 15px;
            color: white;
        }

        .item-leyenda {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1><a href="/">🏠 Home</a></h1>
        <span class="nav-title">PAC-MAN BFS vs DFS</span>
    </nav>

    <div class="container" style="margin-top: 1rem;">
        <div class="laberinto-container">
            <div class="status" id="status">Cargando...</div>
            
            <div id="laberinto" class="laberinto"></div>
            
            <div class="botones-canchas">
                <div class="botones-cancha">
                    <button class="btn-cancha" onclick="cambiarCancha(1)">CANCHA 1<br>BFS VENTAJA</button>
                    <button class="btn-cancha" onclick="cambiarCancha(2)">CANCHA 2<br>DFS VENTAJA</button>
                </div>
            </div>
            
            <div class="botones">
                <button class="btn-bfs" onclick="calcularBFS()">CALCULAR BFS</button>
                <button class="btn-dfs" onclick="calcularDFS()">CALCULAR DFS</button>
                <button class="btn-reset" onclick="resetear()">REINICIAR</button>
            </div>
        </div>
        
        <div class="controles-container">
            <h2>MÉTRICAS</h2>
            
            <div class="metricas">
                <h3>BFS</h3>
                <div class="metrica">
                    <span>Nodos visitados:</span>
                    <strong id="bfs-nodos">0</strong>
                </div>
                <div class="metrica">
                    <span>Profundidad:</span>
                    <strong id="bfs-profundidad">0</strong>
                </div>
            </div>

            <div class="metricas">
                <h3>DFS</h3>
                <div class="metrica">
                    <span>Nodos visitados:</span>
                    <strong id="dfs-nodos">0</strong>
                </div>
                <div class="metrica">
                    <span>Profundidad max:</span>
                    <strong id="dfs-profundidad">0</strong>
                </div>
            </div>

            <div class="leyenda">
                <div class="item-leyenda">
                    <div class="color-box" style="background: #ffff00;"></div>
                    <span>😊 Pacman</span>
                </div>
                <div class="item-leyenda">
                    <div class="color-box" style="background: #ff0000;"></div>
                    <span>👻 Fantasma</span>
                </div>
                <div class="item-leyenda">
                    <div class="color-box" style="background: orange;"></div>
                    <span>Camino BFS</span>
                </div>
                <div class="item-leyenda">
                    <div class="color-box" style="background: #330033;"></div>
                    <span>Explorado DFS</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        class PacmanGame {
            constructor() {
                this.laberintoElement = document.getElementById('laberinto');
                this.statusElement = document.getElementById('status');
                this.cargarLaberinto();
            }

            async cargarLaberinto() {
                try {
                    this.actualizarEstado('Cargando...');
                    const response = await fetch('/pacman/laberinto');
                    const estado = await response.json();
                    this.renderizarLaberinto(estado);
                    this.actualizarEstado('Listo');
                } catch (error) {
                    this.actualizarEstado('Error de conexión');
                }
            }

            actualizarEstado(mensaje) {
                this.statusElement.textContent = mensaje;
            }

            renderizarLaberinto(estado) {
                this.laberintoElement.innerHTML = '';
                
                const laberinto = estado.laberinto;
                const pacman = estado.pacman;
                const fantasma = estado.fantasma;
                const caminoBFS = estado.caminoBFS || [];
                const exploradoDFS = estado.exploradoDFS || [];
                
                for (let i = 0; i < laberinto.length; i++) {
                    for (let j = 0; j < laberinto[i].length; j++) {
                        const celda = document.createElement('div');
                        celda.className = 'celda';
                        
                        if (i === pacman[0] && j === pacman[1]) {
                            celda.className += ' pacman';
                            celda.textContent = '😊';
                        } else if (i === fantasma[0] && j === fantasma[1]) {
                            celda.className += ' fantasma';
                            celda.textContent = '👻';
                        } else if (this.esParteDeCamino(caminoBFS, i, j)) {
                            celda.className += ' camino-bfs';
                            celda.textContent = '•';
                        } else if (this.esParteDeExplorado(exploradoDFS, i, j)) {
                            celda.className += ' explorado-dfs';
                            celda.textContent = '·';
                        } else if (laberinto[i][j] === 1) {
                            celda.className += ' pared';
                            celda.textContent = '█';
                        } else {
                            celda.className += ' camino';
                            celda.textContent = '·';
                        }
                        
                        this.laberintoElement.appendChild(celda);
                    }
                }
                
                // Actualizar métricas
                document.getElementById('bfs-nodos').textContent = estado.metricasBFS?.nodosVisitados || 0;
                document.getElementById('bfs-profundidad').textContent = estado.metricasBFS?.profundidad || 0;
                document.getElementById('dfs-nodos').textContent = estado.metricasDFS?.nodosVisitados || 0;
                document.getElementById('dfs-profundidad').textContent = estado.metricasDFS?.profundidadMaxima || 0;
            }

            esParteDeCamino(camino, i, j) {
                return camino.some(pos => pos[0] === i && pos[1] === j);
            }

            esParteDeExplorado(explorado, i, j) {
                return explorado.some(pos => pos[0] === i && pos[1] === j);
            }
        }

        const game = new PacmanGame();

        async function calcularBFS() {
            try {
                game.actualizarEstado('Calculando BFS...');
                const response = await fetch('/pacman/bfs', { method: 'POST' });
                const estado = await response.json();
                game.renderizarLaberinto(estado);
                game.actualizarEstado('BFS listo');
            } catch (error) {
                game.actualizarEstado('Error BFS');
            }
        }

        async function calcularDFS() {
            try {
                game.actualizarEstado('Calculando DFS...');
                const response = await fetch('/pacman/dfs', { method: 'POST' });
                const estado = await response.json();
                game.renderizarLaberinto(estado);
                game.actualizarEstado('DFS listo');
            } catch (error) {
                game.actualizarEstado('Error DFS');
            }
        }

        async function cambiarCancha(numero) {
            try {
                game.actualizarEstado('Cambiando cancha...');
                const response = await fetch(`/pacman/cancha/${numero}`, { method: 'POST' });
                const estado = await response.json();
                game.renderizarLaberinto(estado);
                game.actualizarEstado(`Cancha ${numero} cargada`);
            } catch (error) {
                game.actualizarEstado('Error cambiando cancha');
            }
        }

        async function resetear() {
            try {
                game.actualizarEstado('Reiniciando...');
                const response = await fetch('/pacman/reset', { method: 'POST' });
                const estado = await response.json();
                game.renderizarLaberinto(estado);
                game.actualizarEstado('Reiniciado');
            } catch (error) {
                game.actualizarEstado('Error reiniciando');
            }
        }
    </script>
</body>
</html>
